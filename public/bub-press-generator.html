
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 新闻稿生成工作流 V7.0 (扁平化流程)</title>

    <script src="https://cdn.tiny.cloud/1/0surl4j9vjjc3t07itiatti38rc157w7o7dqfwy8js5gtiqu/tinymce/7/tinymce.min.js" referrerpolicy="origin"></script>

    <style>
        /* =================================================================
         * 颜色变量 (V7.0: 新拟物主题 Neumorphism)
         * ================================================================= */
        /* 恢复 Poppins 字体，并引入更轻的字重 */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        
        :root {
            --primary-color: #5D5FEF;       /* 柔和的紫色/蓝色作为强调色 */
            --accent-color: #FF9500;       
            --success-color: #34C759;      
            --error-color: #FF3B30;        
            
            /* 新拟物核心颜色 */
            --bg-light: #e0e5ec;           /* 主背景色 (浅灰/米白) */
            --shadow-light: #ffffff;       /* 浅阴影 (高光) */
            --shadow-dark: #a3b1c6;        /* 深阴影 */
            --card-text-light: #303030;    /* 主文本颜色 */
            --secondary-text: #636366;     /* 副文本颜色 */
        }

        /* =================================================================
         * 基础样式与标题 (扁平化流程 / Poppins)
         * ================================================================= */
        body { 
            /* 恢复 Poppins 字体 */
            font-family: 'Poppins', sans-serif; 
            padding: 30px; 
            background-color: var(--bg-light); 
            color: var(--card-text-light); 
            max-width: 1000px;
            margin: 0 auto;
            line-height: 1.6;
            background-attachment: fixed;
        }

        .header { 
            color: var(--primary-color); 
            text-align: center; 
            margin-bottom: 30px; 
        }
        .header h2 { 
            font-size: 2.8em; 
            font-weight: 700; 
            margin-bottom: 5px;
            color: var(--card-text-light); 
        }
        .header p {
            color: var(--secondary-text);
        }
        
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .col { flex: 1; }

        /* =================================================================
         * 流程步骤标题 (代替卡片) & 折叠功能
         * ================================================================= */
        .workflow-step {
            padding: 0; 
            margin-bottom: 35px;
            position: relative;
        }

        .step-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--shadow-dark); /* 流程分隔线 */
            cursor: pointer; /* 可点击 */
        }
        
        .step-badge {
            background-color: var(--primary-color); 
            color: white; 
            padding: 5px 15px; border-radius: 20px; 
            font-weight: 600; font-size: 0.9em;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.15);
            margin-right: 15px;
        }
        .step-header h3 { 
            font-weight: 600; 
            font-size: 1.5em;
            color: var(--card-text-light); 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-grow: 1; /* 确保标题占据剩余空间，让图标能对齐右侧 */
        }
        .step-content {
            padding: 15px 0; 
        }

        /* 折叠样式 */
        .toggle-icon { 
            font-size: 0.8em; 
            transition: transform 0.3s; 
            color: var(--secondary-text); 
            font-weight: 400; 
        }
        .workflow-step.step-collapsed .toggle-icon { 
            transform: rotate(-90deg); /* 折叠时图标旋转 */
        }
        .workflow-step.step-collapsed .step-content { 
            display: none; /* 折叠时隐藏内容 */
        }


        /* =================================================================
         * 表单 (凹陷效果)
         * ================================================================= */
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.95em; color: var(--card-text-light); }
        input[type="text"], select, textarea {
            width: 100%; padding: 12px; border: none; border-radius: 12px; 
            box-sizing: border-box; transition: all 0.3s; font-family: inherit; font-size: 14px;
            background-color: var(--bg-light); 
            color: var(--card-text-light); 
            box-shadow: inset 5px 5px 10px var(--shadow-dark), 
                        inset -5px -5px 10px var(--shadow-light);
        }
        input:focus, textarea:focus {
            outline: none;
            box-shadow: inset 2px 2px 5px var(--shadow-dark), 
                        inset -2px -2px 5px var(--shadow-light);
        }
        textarea { min-height: 120px; font-family: 'Consolas', monospace; line-height: 1.5; }
        #articleContent { display: none; } 
        
        /* 标题列表 */
        .topic-item { 
            padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; transition: all 0.2s;
            background-color: var(--bg-light); 
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            border: none;
            color: var(--card-text-light); 
            line-height: 1.1; 
        }
        .topic-item:hover {
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
        }
        .topic-selected { 
            background-color: var(--bg-light) !important; 
            box-shadow: inset 3px 3px 6px var(--shadow-dark), 
                        inset -3px -3px 6px var(--shadow-light) !important;
            color: var(--primary-color) !important; 
        }

        /* =================================================================
         * 按钮 (常规大按钮)
         * ================================================================= */
        .btn-main { 
            background-color: var(--bg-light); 
            color: var(--primary-color); 
            padding: 12px 18px; 
            border: none; border-radius: 15px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 600;
            transition: all 0.2s; 
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); 
            margin-top: 20px;
        }
        .btn-main:hover { color: var(--primary-color); transform: translateY(-1px); }
        .btn-main:active { 
            box-shadow: inset 3px 3px 6px var(--shadow-dark), 
                        inset -3px -3px 6px var(--shadow-light);
            color: var(--card-text-light); 
            transform: translateY(1px);
        }
        .btn-main:disabled { 
            opacity: 0.6; cursor: not-allowed; 
            box-shadow: 2px 2px 4px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
        }
        .btn-main.tertiary { color: var(--success-color); }

        /* =================================================================
         * 精致功能按钮 (Copy/Export) 
         * ================================================================= */
        .output-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
        }
        .btn-group { display: flex; gap: 12px; }

        .refined-btn { 
            background-color: var(--bg-light);
            color: var(--secondary-text); 
            padding: 8px 16px;            
            border: none; 
            border-radius: 50px;          
            font-size: 13px;              
            font-weight: 600; 
            cursor: pointer; 
            width: auto;                  
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 5px 5px 10px var(--shadow-dark), 
                        -5px -5px 10px var(--shadow-light);
            transition: all 0.2s ease;
        }
        
        .refined-btn:hover {
            color: var(--primary-color); 
            transform: translateY(-2px); 
            box-shadow: 6px 6px 12px var(--shadow-dark), 
                        -6px -6px 12px var(--shadow-light);
        }

        .refined-btn:active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark), 
                        inset -3px -3px 6px var(--shadow-light); 
            transform: translateY(0);
        }

        /* 特定功能色 */
        .refined-btn.download { color: var(--success-color); }
        .refined-btn.download:hover { color: #28a745; }
        
        .refined-btn.html-dl { color: var(--accent-color); }

        /* =================================================================
         * 颜色选择器 (圆形)
         * ================================================================= */
        .quick-color-btn {
            width: 32px !important;     
            height: 32px !important;
            border-radius: 50% !important; 
            cursor: pointer;
            border: 3px solid var(--bg-light); 
            box-shadow: 5px 5px 10px var(--shadow-dark), 
                        -5px -5px 10px var(--shadow-light);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .quick-color-btn:hover {
            transform: scale(1.1);
            box-shadow: 7px 7px 14px var(--shadow-dark), 
                        -7px -7px 14px var(--shadow-light);
        }
        .quick-color-btn:active {
            transform: scale(0.95);
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2);
        }


        /* 状态栏 & 其他辅助元素 */
        #status { padding: 15px; border-radius: 15px; font-weight: 600; margin-top: 20px; text-align: center; display: none; color: white; background-color: var(--primary-color);}
        .status-loading { background-color: var(--secondary-text); display: block !important;}
        .status-success { background-color: var(--success-color); display: block !important;}
        .status-error { background-color: var(--error-color); display: block !important; color: #FFFFFF;}
        
        #controlPanel { 
            background: var(--bg-light) !important; 
            border-radius: 15px;
            box-shadow: inset 3px 3px 6px var(--shadow-dark), 
                        inset -3px -3px 6px var(--shadow-light);
        }
        .save-hint { font-size: 0.7em; text-align: right; margin-top: -5px; margin-bottom: 5px; font-weight: 500; color: var(--success-color); }
        
    </style>
</head>
<body onload="loadState()">
    <div class="header">
        <h2>✨ BuB Press Generator V7.0</h2>
        <p>bubNosmoking</p>
    </div>

    <div class="workflow-step" id="step1">
        <div class="step-header" onclick="toggleStep('step1')">
            <span class="step-badge">Step 1</span>
            <h3>配置与主题分析 <span class="toggle-icon">▼</span></h3>

        <div class="step-content">

    <div class="workflow-step step-collapsed" id="step2">
        <div class="step-header" onclick="toggleStep('step2')">

        </div>
        <div class="step-content">
            <div id="topicList" style="margin-bottom: 20px; color: var(--secondary-text); font-style: italic;">
                (请先完成步骤一)
            </div>

            <div id="controlPanel" style="display:none; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <div class="row" style="margin-bottom: 0;">
                    <div class="col">
                        <label for="toneSelect">🎨 语气风格:</label>
                        <select id="toneSelect">
                            <option value="专业权威 (Professional & Authoritative)">专业权威 (默认)</option>
                            <option value="轻松幽默 (Casual & Humorous)">轻松幽默</option>
                            <option value="激情营销 (Passionate & Marketing)">激情营销</option>
                            <option value="深度技术 (Deep Tech)">深度技术</option>

                        </select>
                    </div>
                    <div class="col">
                        <label for="audienceInput">🎯 目标受众:</label>
                        <input type="text" id="audienceInput" value="行业从业者" placeholder="例如：投资人、开发者、大众...">
                    </div>
                </div>
            </div>
            
            <button id="generateArticleBtn" class="btn-main" onclick="generateArticleAction()" disabled>✍️ 请选择上方一个主题以启用</button>


            <div id="articleResultArea" style="margin-top: 20px; display: none;">
                <div class="output-header">
                    <label>生成文章 (富文本编辑器):</label>
                    <div class="btn-group">
                        <button class="refined-btn" onclick="copyArticleContent()">📋 复制 HTML</button> 
                        <button class="refined-btn download" onclick="downloadWordFile()">💾 导出 Word</button> 
                    </div>
                </div>
                <textarea id="articleContent" class="editable" rows="12"></textarea>
                
                <button class="btn-main tertiary" onclick="startSeoGeneration()">

    </div>

    <div class="workflow-step step-collapsed" id="step3">
        <div class="step-header" onclick="toggleStep('step3')">
            <span class="step-badge">Step 3</span>
            <h3>生成 SEO 元素 <span class="toggle-icon">▼</span></h3>
        </div>
        <div class="step-content">
            <div id="seoArea" style="color: var(--secondary-text); font-style: italic;">(请先完成步骤二)</div>

            <div id="seoResultArea" style="margin-top: 20px; display: none;">
                <div class="output-header">
                    <label>SEO 结果 (可编辑):</label>
                    <button class="refined-btn" onclick="copyToClipboard('seoResult')">📋 一键复制</button>
                </div>
                <textarea id="seoResult" class="editable" rows="6" oninput="saveState()"></textarea>
                
                <div style="margin-top: 20px; border-top: 1px dashed rgba(0, 0, 0, 0.1); padding-top: 20px;">
                    <label>准备排版 (选择主色调):</label>
                    <div class="color-picker-group" style="display: flex; align-items: center; justify-content: space-between;">
                        
                        <div style="display: flex; gap: 12px; align-items: center;">
                            <div class="quick-color-btn" style="background:#007AFF;" onclick="setColor('#007AFF')" title="Blue"></div>
                            <div class="quick-color-btn" style="background:#34C759;" onclick="setColor('#34C759')" title="Green"></div>
                            <div class="quick-color-btn" style="background:#FF9500;" onclick="setColor('#FF9500')" title="Orange"></div>
                            <div class="quick-color-btn" style="background:#5856D6;" onclick="setColor('#5856D6')" title="Purple"></div>
                            
                            <input type="color" id="colorInput" value="#007AFF" style="width: 40px; height: 40px; padding: 0; border-radius: 50%; border: none; background: none; margin-left: 10px; cursor: pointer;">
                        </div>

                        <button class="refined-btn" style="width: auto; padding: 10px 20px;" onclick="startHtmlFormatting()">
                            🎨 生成排版
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="workflow-step step-collapsed" id="step4">
        <div class="step-header" onclick="toggleStep('step4')">
            <span class="step-badge">Step 4</span>
            <h3>HTML 排版与预览 <span class="toggle-icon">▼</span></h3>
        </div>
        <div class="step-content">
            <div id="formattingArea" style="color: var(--secondary-text); font-style: italic;">(请先完成步骤三)</div>
            
            <div id="htmlResultArea" style="margin-top: 20px; display: none;">
                <div class="row">
                    <div class="col">
                        <div class="output-header">
                            <label>HTML 源代码:</label>
                            <div class="btn-group">
                                <button class="refined-btn" onclick="copyToClipboard('htmlResult')">📋 复制代码</button>
                                <button class="refined-btn html-dl" id="downloadHtmlBtn" onclick="downloadHtml()">💾 下载文件</button>
                            </div>
                        </div>
                        <textarea id="htmlResult" class="editable" rows="8" oninput="saveState(); updatePreview();"></textarea>
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <label style="margin:0;">👁️ 实时效果预览:</label>
                </div>
                <div id="previewContainer" style="margin-top: 15px; border: 2px dashed rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 20px; background: #FFFFFF; min-height: 200px; color: #333;">
                    </div>
            </div>
        </div>
    </div>

    <div id="status">准备就绪</div>

    <script>
        // =================================================================
        // 配置 & 全局变量
        // =================================================================
        const MODEL_NAME = "gemini-2.5-flash"; 
        let selectedTopicGlobal = null; 
        let editorInstance = null; // TinyMCE 实例

        // DOM Elements
        const statusDiv = document.getElementById('status');
        const topicListDiv = document.getElementById('topicList');
        const generateArticleBtn = document.getElementById('generateArticleBtn');
        const seoResultTextarea = document.getElementById('seoResult');
        const htmlResultTextarea = document.getElementById('htmlResult');

        // P-UX: TinyMCE 初始化
        function initializeTinyMCE(initialContent = '') {
            if (editorInstance) {
                editorInstance.setContent(initialContent);
                return;
            }

            tinymce.init({
                selector: '#articleContent',
                height: 400,
                skin: 'oxide', 
                content_css: 'default',
                plugins: 'lists link code',
                toolbar: 'undo redo | formatselect | bold italic backcolor | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | removeformat | code',
                setup: function (editor) {
                    editorInstance = editor;
                    editor.on('init', function () {
                        const savedContent = localStorage.getItem('v70_articleContent');
                        if (savedContent) editor.setContent(savedContent);
                    });
                    editor.on('change', saveState);
                }
            });
        }
        
        // P-UX: 折叠流程功能
        function toggleStep(stepId, forceExpand = false) {
            const step = document.getElementById(stepId);
            if (!step) return;
            const isCollapsed = step.classList.contains('step-collapsed');
            
            // 如果强制展开，移除折叠类
            if (forceExpand) {
                step.classList.remove('step-collapsed');
            } 
            // 如果当前是折叠的，则展开
            else if (isCollapsed) {
                step.classList.remove('step-collapsed');
            } 
            // 如果当前是展开的，则折叠
            else if (!isCollapsed && !forceExpand) {
                step.classList.add('step-collapsed');
            }
        }

        // P-SAFETY: Auto-save/Load Functions
        const STATE_KEYS = ['api_key', 'websiteUrl', 'fileContent', 'customKeywords', 'seoResult', 'htmlResult'];
        
        function saveState() {
            STATE_KEYS.forEach(id => {
                const element = document.getElementById(id);
                if (element) localStorage.setItem(`v70_${id}`, element.value);
            });
            if (editorInstance) {
                localStorage.setItem('v70_articleContent', editorInstance.getContent());
            }
            localStorage.setItem('v70_colorInput', document.getElementById('colorInput').value);
        }

        function loadState() {
            STATE_KEYS.forEach(id => {
                const element = document.getElementById(id);
                const savedValue = localStorage.getItem(`v70_${id}`);
                if (element && savedValue) element.value = savedValue;
            });
            const savedColor = localStorage.getItem(`v70_colorInput`);
            if (savedColor) document.getElementById('colorInput').value = savedColor;

            setTimeout(() => {
                const savedArticleContent = localStorage.getItem('v70_articleContent') || '';
                initializeTinyMCE(savedArticleContent);

                if (savedArticleContent.length > 50) {
                    document.getElementById('articleResultArea').style.display = 'block';
                    updatePreview(); 
                }
            }, 100);
        }

        // P-UTILITY: Copy/Download/Helpers
        function copyArticleContent() {
            if (!editorInstance) return;
            const htmlContent = editorInstance.getContent();
            const tempTextarea = document.createElement('textarea');
            tempTextarea.value = htmlContent;
            document.body.appendChild(tempTextarea);
            tempTextarea.select();
            document.execCommand("copy");
            document.body.removeChild(tempTextarea);
            
            // UI Feedback
            const copyBtn = document.querySelector('button[onclick="copyArticleContent()"]');
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '✅ 已复制';
            setTimeout(() => { copyBtn.innerHTML = originalText; }, 1500);
        }

        function downloadWordFile() {
            if (!editorInstance) {
                showError("编辑器未加载或内容为空。");
                return;
            }
            
            const htmlContent = editorInstance.getContent();
            if (!htmlContent) {
                showError("文章内容为空，无法导出。");
                return;
            }

            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Press Release</title></head><body>";
            const footer = "</body></html>";
            
            const finalHtml = header + htmlContent + footer;
            
            const filename = 'press-release-' + new Date().toISOString().slice(0, 10) + '.doc';
            
            const blob = new Blob([finalHtml], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            updateStatus('💾 文章已导出为 Word (.doc) 文件。', 'success');
        }


        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            element.select();
            document.execCommand("copy");
            const btn = document.querySelector(`button[onclick="copyToClipboard('${elementId}')"]`);
            const originalText = btn.innerHTML;
            btn.innerHTML = '✅ 已复制';
            setTimeout(() => { btn.innerHTML = originalText; }, 1500);
        }
        
        function downloadHtml() {
            const filename = 'press-release-' + new Date().toISOString().slice(0, 10) + '.html';
            const htmlContent = htmlResultTextarea.value;
            const fullHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Press Release</title></head><body>${htmlContent}</body></html>`;
            const blob = new Blob([fullHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            updateStatus('💾 HTML 文件已下载。', 'success');
        }

        function setColor(hex) { document.getElementById('colorInput').value = hex; saveState(); }
        function updateStatus(message, type = 'loading') { statusDiv.innerHTML = message; statusDiv.className = `status-${type}`; }
        function updatePreview() { 
            const previewContainer = document.getElementById('previewContainer');
            previewContainer.innerHTML = htmlResultTextarea.value; 
        }
        function showError(error) { 
            const message = error.message ? error.message : String(error);
            
            if (message.includes('Failed to fetch')) {
                updateStatus(`❌ 发生网络错误: Failed to fetch。请检查您的 API 密钥、网络连接或 F12 控制台。`, 'error');
            } else {
                updateStatus(`❌ 发生错误: ${message.replace(/<[^>]*>/g, '')}`, 'error');
            }
            console.error("--- 详细错误信息 Start ---");
            console.error(error);
            console.error("--- 详细错误信息 End ---");
        }

        // =================================================================
        // 核心 AJAX 函数
        // =================================================================
        async function callGeminiApi(prompt, generationConfig = {}, responseSchema = null) {
            const apiKey = document.getElementById('api_key').value;
            if (!apiKey) throw new Error("API 密钥不能为空。");

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
            
            const config = { temperature: 0.5, ...generationConfig, ...(responseSchema && { responseMimeType: "application/json", responseSchema: responseSchema }) };

            const response = await fetch(url, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: config })
            });

            const result = await response.json();
            if (!response.ok) throw new Error(result.error?.message || response.statusText);
            
            const content = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!content) throw new Error("API 返回结果为空。");

            if (responseSchema) {
                try { return JSON.parse(content); } catch (e) { throw new Error("JSON 解析失败。"); }
            }
            return content;
        }

        // =================================================================
        // 步骤一：分析 
        // =================================================================
        function startAnalysis() {
            const fileContent = document.getElementById('fileContent').value.trim();
            if (fileContent.length < 50) return showError("输入内容太少 (需 >50 字符)。");

            updateStatus('正在分析内容并生成 GEO 优化英文主题...', 'loading');
            
            document.getElementById('articleResultArea').style.display = 'none';
            document.getElementById('seoResultArea').style.display = 'none';
            document.getElementById('htmlResultArea').style.display = 'none';
            document.getElementById('controlPanel').style.display = 'none';
            generateArticleBtn.disabled = true; 

            generateTopics(fileContent).then(renderTopics).catch(showError);
        }

        async function generateTopics(fileContent) {
            const keywords = document.getElementById('customKeywords').value;
            
            const prompt = `
               Role:
You are a Public Relations & Media Strategy Expert specializing in GEO (Generative Engine Optimization) and editorial-style news positioning.

Task:
Analyze the provided content and generate 5 English news-style headlines suitable for:

Media pitching

Press release distribution

AI search result positioning (Google SGE / ChatGPT / Perplexity)

Strategic Objectives

Headlines must sound editorial, insightful, and non-generic — not like mass-produced SEO titles.

Each headline must take a distinct angle (trend, ranking, insight, comparison, market shift, or expert judgment).

Optimize for GEO visibility by clearly expressing entities, authority, and conclusions.

Authority Keyword Usage

Naturally incorporate GEO authority prefixes where appropriate (e.g., China Top, Industry-Leading, Expert Guide, Leading Manufacturer).

Avoid repeating the same prefix structure across multiple titles.

Mandatory Keywords

If natural and contextually appropriate, integrate the following keywords into some (not all) headlines:
${keywords}

Writing Rules

Language Output:

English headline

Chinese translation

Format (Strict):
English Headline ||| 中文标题翻译
Use ||| as the only separator. No parentheses.

Length:

English headline must be under 200 characters

Variation Constraint:

No two headlines may share the same opening structure.

Avoid repetitive phrases like “Top”, “Best”, or “Ultimate” appearing more than twice total.

Tone & Style

Professional, confident, and media-ready

Insight-driven rather than promotional

Suitable for being quoted or surfaced directly in AI-generated answers
                ${fileContent}
            `;
            
            const schema = { type: "object", properties: { topics: { type: "array", items: { type: "string" } } }, required: ["topics"] };
            
            const result = await callGeminiApi(prompt, { temperature: 0.8 }, schema);
            return result.topics;
        }

        function renderTopics(topics) {
            topicListDiv.innerHTML = '';
            topics.forEach((topic, index) => {
                const item = document.createElement('div');
                item.className = 'topic-item';
                
                const parts = topic.split('|||').map(p => p.trim());
                const englishTitle = parts[0] || topic;
                const chineseTranslation = parts[1] || '（翻译缺失）';
                
                item.innerHTML = `
                    <span style="font-weight: 600;">📌 ${englishTitle}</span>
                    <br>
                    <small style="opacity: 0.8; font-size: 0.85em; display: block; margin-top: 3px; color: var(--secondary-text);">${chineseTranslation}</small>
                `;
                
                item.onclick = () => selectTopic(topic, item);
                topicListDiv.appendChild(item);
            });
            updateStatus('✅ GEO 英文主题已生成，请选择一个主题。', 'success');
        }

        // =================================================================
        // 步骤二：生成文章 
        // =================================================================
        function selectTopic(topic, item) {
            document.querySelectorAll('.topic-item').forEach(i => i.classList.remove('topic-selected'));
            item.classList.add('topic-selected');
            
            selectedTopicGlobal = topic; 
            document.getElementById('controlPanel').style.display = 'block';
            
            const englishPart = topic.split('|||')[0].trim();
            generateArticleBtn.disabled = false;
            generateArticleBtn.innerText = `✍️ 使用主题: "${englishPart.substring(0, 15)}..." 生成文章`;
            
            updateStatus(`已选择主题。请配置风格并点击生成。`, 'success');
        }

        function generateArticleAction() {
            if (!selectedTopicGlobal) return showError("请先选择一个主题。");
            if (!editorInstance) return showError("富文本编辑器尚未完全加载，请稍候。");

            const fileContent = document.getElementById('fileContent').value;
            const tone = document.getElementById('toneSelect').value;
            const audience = document.getElementById('audienceInput').value;
            const keywords = document.getElementById('customKeywords').value;
            const websiteUrl = document.getElementById('websiteUrl').value; 

            const englishTopic = selectedTopicGlobal.split('|||')[0].trim();

            updateStatus(`正在撰写 GEO 优化文章 (风格: ${tone})...`, 'loading');
            generateArticleBtn.disabled = true; 

            const prompt = `
                你是一位专业的英文内容营销专家，专注于 **GEO (Generative Engine Optimization)**。
                请根据以下信息撰写一篇 1000-1200 词的英文新闻博客文章。
                
                **核心指令:**
                1. **主题:** ${englishTopic} (这是 GEO 优化的标题)
                2. **关键任务:** 文章内容必须强有力地**支撑和证明**标题中的权威声称。
                3. **强制包含关键词 (Mandatory Keywords):** 务必将以下关键词**自然、流畅地**融入文章中： "${keywords}"。
                4. **强制网址植入:** 必须在文章中至少包含一次以下官网网址，并将其格式化为一个醒目的 Call-to-Action 链接： **${websiteUrl}**。如果网址为空，则跳过此要求。
                5. **语气风格:** ${tone}
                6. **目标受众:** ${audience}
                7. **原始内容:** ${fileContent}
                8. **结构要求:** 清晰的 <H2>/<H3> 标题，包含 "Key Takeaways" 或 "Why Choose Us" 列表。
                9. **格式:** **请严格输出标准的 HTML 富文本格式，不要包含 Markdown 语法。**
            `;

            callGeminiApi(prompt, { temperature: 0.7 })
                .then(content => {
                    editorInstance.setContent(content); 
                    saveState(); 
                    document.getElementById('articleResultArea').style.display = 'block';
                    generateArticleBtn.disabled = false;
                    updateStatus('✅ GEO 文章已生成！请在编辑器中检查关键词和网址。', 'success');
                })
                .catch(error => {
                    generateArticleBtn.disabled = false;
                    showError(error);
                });
        }

        // =================================================================
        // 步骤三：SEO 
        // =================================================================
        function startSeoGeneration() {
            const articleContentElement = document.getElementById('articleContent');
            if (!editorInstance || !articleContentElement) return showError("富文本编辑器尚未加载。");

            const content = editorInstance.getContent(); 
            if (!content) return showError("文章内容为空。");

            const plainTextContent = content.replace(/<[^>]*>/g, '');

            updateStatus('正在生成 SEO 元素...', 'loading');

            const prompt = `
                请根据以下英文博客文章内容，生成其对应的 SEO 优化元素。
                
                **核心指令:**
                1. 确保 SEO 标题和 Meta 描述是**吸引人且差异化**的。
                2. 文章内容 (纯文本): ${plainTextContent.substring(0, 5000)}...
                
                产出要求 (严格遵循):
                1. **URL Slug (英文URL后缀):** 简洁、关键词友好、全部小写。
                2. **SEO Title (英文):** 长度不超过60个字符。
                3. **SEO Meta Description (英文):** 长度不超过160个字符。
                4. **SEO Keywords (英文):** 逗号连在一起隔开。
                
                请将所有输出格式化为 JSON 格式。
            `;

            const schema = { 
                type: "object", 
                properties: { 
                    url_slug: {type:"string"}, 
                    seo_title: {type:"string"}, 
                    seo_meta_description: {type:"string"}, 
                    seo_keywords: {type:"string"}
                }, 
                required: ["url_slug", "seo_title", "seo_meta_description", "seo_keywords"] 
            };

            callGeminiApi(prompt, { temperature: 0.7 }, schema)
                .then(data => {
                    const text = `URL: ${data.url_slug}\nTitle: ${data.seo_title}\nDesc: ${data.seo_meta_description}\nKeywords: ${data.seo_keywords}`;
                    seoResultTextarea.value = text;
                    
                    saveState(); 
                    document.getElementById('seoResultArea').style.display = 'block';
                    updateStatus('✅ SEO 元素已生成。请选择颜色并生成排版。', 'success');
                })
                .catch(showError);
        }

        // =================================================================
        // 步骤四：排版
        // =================================================================
        function startHtmlFormatting() {
            const articleContentElement = document.getElementById('articleContent');
            if (!editorInstance || !articleContentElement) return showError("富文本编辑器尚未加载。");

            const content = editorInstance.getContent();
            const color = document.getElementById('colorInput').value;
            
            if (!content) return showError("文章内容为空。");

            updateStatus(`正在进行 HTML 排版 (色调: ${color})...`, 'loading');

            const prompt = `
                作为前端设计师，将以下文章排版为富文本 HTML。
                要求: 
                1. 使用内联 CSS。
                2. 主色调: ${color} (用于强调、边框、背景点缀)。
                3. 移动端响应式。
                4. 文章中应包含 3-4 个图片占位符，使用 <img src="https://placehold.co/800x400" alt="Image Placeholder" style="width: 100%; max-width: 800px; height: auto; display: block; margin: 20px auto;">，并对图片进行响应式排版。
                5. 不要包含 <html>/<body> 标签，只输出内容部分的 HTML。
                6. 文章末尾添加 FAQ 部分。
                文章内容 (已是基础 HTML 结构): ${content}
            `;

            callGeminiApi(prompt, { temperature: 0.8 })
                .then(html => {
                    htmlResultTextarea.value = html;
                    saveState(); 
                    document.getElementById('htmlResultArea').style.display = 'block';
                    
                    updatePreview(); 
                    
                    updateStatus('✨ V7.0 流程完成！新拟物风格已应用。', 'success');
                })
                .catch(showError);
        }
    </script>
</body>
